<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecommerce - API</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="topic-name">Our Product</h1>
    </div>

    <script>
      const container = document.querySelector(".container");

      async function getProductData() {
        try {
          const response = await fetch(
            "https://kolzsticks.github.io/Free-Ecommerce-Products-Api/main/products.json",
          );
          const product = await response.json();

          const productHTML = product
            .map(
              (product) => `
            <div class="product-card">
              <div class="top-sec">
                <div class="img-container">
                  <img
                    src="${product.image}"
                    alt=""
                  />
                </div>
                <div class="product-rating">⭐: ${product.rating.stars} / 5 (${product.rating.count})</div>
              </div>
              <div class="bot-sec">
                <div class="bot-head-sec">
                  <div class="name">Name: ${product.name}</div>
                  <div class="category">Category: ${product.category}</div>
                </div>
                <div class="bot-mid-sec">
                  <div class="desc-text">
                    "${product.description}"
                  </div>
                </div>
                <div class="bot-foot-sec">
                  <div class="keyword-container">
                    ${product.keywords.join(", ")}
                  </div>
                  <div class="price-container">${product.priceCents} ฿</div>
                </div>
              </div>
            </div>
          `,
            )
            .join("");

          container.insertAdjacentHTML("beforeend", productHTML);
        } catch (error) {
          console.log("Error", error);
        }
      }
      getProductData();
    </script>
  </body>
</html>
